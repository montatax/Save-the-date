<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paula y Javier</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,500&amp;family=Josefin+Sans:wght@300;400;600&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #faf8f4;
    display: flex;
    justify-content: center;
    padding: 0;
  }
  .invitation {
    max-width: 800px;
    width: 100%;
    background: #faf8f4;
  }
  .photo {
    text-align: center;
    padding: 20px 45px 0;
  }
  .photo img {
    width: 100%;
    display: block;
    border-radius: 4px;
  }
  .text-block {
    text-align: center;
    padding: 32px 20px 44px;
  }
  .names {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 500;
    font-size: 1.3rem;
    letter-spacing: 5px;
    color: #1a1a1a;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: #1a1a1a;
    margin-bottom: 24px;
  }
  .nos-casamos {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 1.6rem;
    color: #1a1a1a;
    margin-bottom: 20px;
  }
  .body-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: #1a1a1a;
    line-height: 1.8;
  }
  .highlight {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: #1a1a1a;
    margin-top: 18px;
  }
</style>
</head>
<body>
  <div class="invitation">
    <div class="photo">
      <img src="https://raw.githubusercontent.com/montatax/Save-the-date/main/savethedate.jpg" alt="Paula y Javier">
    </div>
    <div class="text-block">
      <div class="names">Paula y Javier</div>
      <div class="date">25 de septiembre de 2026</div>
      <div class="nos-casamos">¡Nos casamos!</div>
      <div class="body-text">
        Nos hace mucha ilusión compartir este día con vosotros.<br>
        Os esperamos el 25 de septiembre a las 12:00h<br>
        en la Iglesia de San Marcos.<br>
        Luego lo celebraremos por todo lo alto<br>
        en Finca Saudade.
      </div>
      <div class="highlight">Madrid, España</div>
    </div>
  </div>

</body></html>
