<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Date</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,500&amp;family=Josefin+Sans:wght@300;400&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #faf8f4;
    display: flex;
    justify-content: center;
    padding: 0;
  }

  .invitation {
    max-width: 500px;
    width: 100%;
    background: #faf8f4;
  }

  .photo img {
    width: 100%;
    display: block;
  }

  .text-block {
    text-align: center;
    padding: 32px 30px 44px;
  }

  .names {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 300;
    font-size: 1.1rem;
    letter-spacing: 5px;
    color: #3b5998;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .save-the-date {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 400;
    font-size: 2.3rem;
    letter-spacing: 3px;
    color: #3b5998;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .save-the-date .the {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.9rem;
    letter-spacing: 0;
    text-transform: lowercase;
  }

  .nos-casamos {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.6rem;
    color: #3b5998;
    margin-bottom: 24px;
  }

  .body-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: #1a1a1a;
    line-height: 1.75;
    margin-bottom: 28px;
  }
  .body-text em { font-style: italic; }

  .divider {
    width: 45px;
    height: 1px;
    background: #ccc;
    margin: 0 auto 24px;
  }

  .date {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 400;
    font-size: 1.1rem;
    letter-spacing: 3px;
    color: #1a1a1a;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .city {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: #1a1a1a;
  }
</style>
</head>
<body>
  <div class="invitation">

    <div class="photo">
      <img src="https://raw.githubusercontent.com/montatax/Save-the-date/main/savethedate.jpg" alt="Paula y Javier">
    </div>

    <div class="text-block">
      <div class="names">Paula y Javier</div>
      <div class="save-the-date">SAVE <span class="the">the</span> DATE</div>
      <div class="nos-casamos">¡Nos casamos!</div>
      <div class="body-text">
        No nos imaginamos nuestro gran día sin vosotros.<br>
        Marca esta fecha en el calendario,<br>
        <em>¡no puedes faltar a nuestra boda!</em>
      </div>
      <div class="divider"></div>
      <div class="date">25 Septiembre, 2026</div>
      <div class="city">Madrid, España</div>
    </div>

  </div>

</body></html>
